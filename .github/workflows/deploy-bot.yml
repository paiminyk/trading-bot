name: Auto Install & Run BOT v1.0

on:
  push:
    branches: [ main, master ]
  schedule:
    # Jalankan setiap hari jam 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Bisa di-trigger manual dari GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Clone repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Python 3.10
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-binance pandas requests

      # Step 4: Create .env dari GitHub Secrets
      - name: Create environment file
        run: |
          cat > config.env << EOF
          API_KEY=${{ secrets.BINANCE_API_KEY }}
          API_SECRET=${{ secrets.BINANCE_API_SECRET }}
          BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
          chmod 600 config.env

      # Step 5: Run bot (dengan timeout 23 jam untuk keep-alive)
      - name: Run Trading Bot
        run: |
          timeout 82800 python bot_auto_mode_v1.py
        env:
          PYTHONUNBUFFERED: 1
